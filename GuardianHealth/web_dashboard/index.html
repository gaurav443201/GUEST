<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guardian Health — Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy-deep: #070D1C;
      --navy-card: #111C30;
      --navy-elevated: #172135;
      --navy-border: #1E2D45;
      
      --cyan: #00C8FF;
      --red-vital: #FF3D3D;
      --amber-vital: #FFC107;
      --green-vital: #00E676;
      
      --text-primary: #F0F4FF;
      --text-secondary: #8899BB;
      --text-muted: #4A5F80;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--navy-deep);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding-top: 20px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-icon {
      color: var(--cyan);
      font-size: 24px;
      cursor: pointer;
    }
    .header-title {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .header-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .refresh-btn {
      background: none;
      border: none;
      color: var(--cyan);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--navy-card);
      transition: all 0.2s;
    }
    .refresh-btn:hover { background: var(--navy-elevated); transform: rotate(15deg); }

    /* ── Summary Cards ── */
    .summary-row {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
    }
    .summary-card {
      flex: 1;
      background: var(--navy-card);
      border-radius: 14px;
      padding: 16px;
      text-align: center;
      border: 1px solid;
    }
    .summary-card.emergency { border-color: rgba(255, 61, 61, 0.4); }
    .summary-card.assistance { border-color: rgba(255, 193, 7, 0.4); }
    .summary-card.service { border-color: rgba(0, 230, 118, 0.4); }

    .summary-value {
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 4px;
    }
    .summary-card.emergency .summary-value { color: var(--red-vital); }
    .summary-card.assistance .summary-value { color: var(--amber-vital); }
    .summary-card.service .summary-value { color: var(--green-vital); }

    .summary-label {
      font-size: 11px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .summary-card.emergency .dot { background: var(--red-vital); }
    .summary-card.assistance .dot { background: var(--amber-vital); }
    .summary-card.service .dot { background: var(--green-vital); }

    /* ── Event Log ── */
    .event-log-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .alert-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .alert-card {
      background: var(--navy-card);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      position: relative;
      overflow: hidden;
      border: 1.5px solid var(--navy-border);
      transition: all 0.3s ease;
    }
    .alert-card.emergency { border-color: rgba(255, 61, 61, 0.5); background: rgba(255, 61, 61, 0.05); }
    .alert-card.assistance { border-color: rgba(255, 193, 7, 0.5); background: rgba(255, 193, 7, 0.05); }
    .alert-card.service { border-color: rgba(0, 230, 118, 0.5); }
    
    .alert-card.resolved {
      opacity: 0.6;
      border-color: var(--navy-border);
      background: var(--navy-card);
    }

    .accent-bar {
      width: 4px;
      border-radius: 4px;
      margin-right: 16px;
    }
    .alert-card.emergency .accent-bar { background: var(--red-vital); }
    .alert-card.assistance .accent-bar { background: var(--amber-vital); }
    .alert-card.service .accent-bar { background: var(--green-vital); }
    .alert-card.resolved .accent-bar { background: var(--navy-border); }

    .card-content { flex: 1; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .alert-title {
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .alert-id {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
    }
    
    .priority-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 8px;
      letter-spacing: 0.5px;
    }
    .alert-card.emergency .priority-badge { background: rgba(255, 61, 61, 0.15); color: var(--red-vital); }
    .alert-card.assistance .priority-badge { background: rgba(255, 193, 7, 0.15); color: var(--amber-vital); }
    .alert-card.service .priority-badge { background: rgba(0, 230, 118, 0.15); color: var(--green-vital); }
    .alert-card.resolved .priority-badge { background: var(--navy-elevated); color: var(--text-muted); }

    .info-row {
      display: flex;
      gap: 20px;
      margin-bottom: 8px;
    }
    .info-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .info-icon { font-size: 14px; opacity: 0.7; }
    
    .alert-card.emergency .info-icon { color: var(--red-vital); }
    .alert-card.assistance .info-icon { color: var(--amber-vital); }
    .alert-card.service .info-icon { color: var(--green-vital); }
    .alert-card.resolved .info-icon { color: var(--text-muted); }

    .card-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .resolve-btn {
      background: transparent;
      border: 1px solid rgba(0, 230, 118, 0.4);
      color: var(--green-vital);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .resolve-btn:hover {
      background: rgba(0, 230, 118, 0.1);
      border-color: var(--green-vital);
    }

    .status-resolved {
      color: var(--green-vital);
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--navy-elevated);
      padding: 6px 12px;
      border-radius: 8px;
    }

    /* AI Action Plan */
    .ai-btn {
      background: rgba(0, 200, 255, 0.1);
      border: 1px solid rgba(0, 200, 255, 0.3);
      color: var(--cyan);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      margin-right: 10px;
      transition: all 0.2s;
    }
    .ai-btn:hover { background: rgba(0, 200, 255, 0.2); }
    
    .ai-plan-box {
      margin-top: 12px;
      padding: 12px;
      background: var(--navy-elevated);
      border-radius: 8px;
      border-left: 3px solid var(--cyan);
      display: none;
      font-size: 13px;
      color: var(--text-primary);
    }

    @media (max-width: 600px) {
      .info-row { flex-direction: column; gap: 8px; }
      .card-header { flex-direction: column; gap: 8px; align-items: flex-start; }
      .priority-badge { position: absolute; top: 16px; right: 16px; }
    }
  </style>
</head>
<body>

<div class="container">
  
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="header-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      </div>
      <div>
        <div class="header-title">Command Center</div>
        <div class="header-subtitle" id="record-count">0 events recorded</div>
      </div>
    </div>
    <button class="refresh-btn" onclick="fetchAlerts()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    </button>
  </div>

  <!-- Summary Cards -->
  <div class="summary-row">
    <div class="summary-card emergency">
      <div class="summary-value" id="count-emergency">0</div>
      <div class="summary-label"><div class="dot"></div> Emergency</div>
    </div>
    <div class="summary-card assistance">
      <div class="summary-value" id="count-assistance">0</div>
      <div class="summary-label"><div class="dot"></div> Assistance</div>
    </div>
    <div class="summary-card service">
      <div class="summary-value" id="count-service">0</div>
      <div class="summary-label"><div class="dot"></div> Service</div>
    </div>
  </div>

  <!-- Event Log -->
  <div class="event-log-title">EVENT LOG</div>
  <div class="alert-list" id="alert-list">
    <!-- Cards will be injected here -->
  </div>

</div>

<script>
  const API_URL = "https://guardian-health-api-s10i.onrender.com";

  async function fetchAlerts() {
    try {
      const r = await fetch(`${API_URL}/alerts`);
      if (r.ok) {
        const alerts = await r.json();
        renderAlerts(alerts);
        updateSummary(alerts);
      }
    } catch (e) {
      console.error("Failed to fetch alerts", e);
    }
  }

  function updateSummary(alerts) {
    document.getElementById("record-count").textContent = `${alerts.length} events recorded`;
    
    document.getElementById("count-emergency").textContent = alerts.filter(a => a.type === "emergency").length;
    document.getElementById("count-assistance").textContent = alerts.filter(a => a.type === "assistance").length;
    document.getElementById("count-service").textContent = alerts.filter(a => a.type === "room_service").length;
  }

  function renderAlerts(alerts) {
    const list = document.getElementById("alert-list");
    
    if (alerts.length === 0) {
      list.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-secondary)">No events recorded yet.</div>`;
      return;
    }

    list.innerHTML = alerts.map(a => {
      const isResolved = a.status === "resolved";
      
      let typeClass = "service";
      let title = "🛎 Room Service";
      let priority = "LOW PRIORITY";
      
      if (a.type === "emergency") { typeClass = "emergency"; title = "🚨 Emergency"; priority = "HIGH PRIORITY"; }
      if (a.type === "assistance") { typeClass = "assistance"; title = "🔔 Assistance"; priority = "MEDIUM PRIORITY"; }

      const timeStr = formatTime(a.timestamp);

      // Resolve button or Resolved text
      const actionHtml = isResolved 
        ? `<div class="status-resolved"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> RESOLVED</div>`
        : `
           ${a.type === 'emergency' ? `<button class="ai-btn" onclick="getAiPlan(${a.id}, ${a.heart_rate}, ${a.spo2})">Get AI Plan</button>` : ''}
           <button class="resolve-btn" onclick="resolve(${a.id})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> MARK AS RESOLVED</button>
          `;

      return `
        <div class="alert-card ${typeClass} ${isResolved ? 'resolved' : ''}">
          <div class="accent-bar"></div>
          <div class="card-content">
            <div class="card-header">
              <div class="alert-title">
                ${title} <span class="alert-id">#${a.id}</span>
              </div>
              <div class="priority-badge">${priority}</div>
            </div>
            
            <div class="info-row">
              <div class="info-item">
                <span class="info-icon">🚪</span> ${a.room_number || a.location}
              </div>
              <div class="info-item">
                <span class="info-icon">⏱</span> ${timeStr}
              </div>
            </div>

            <div class="info-row">
              ${a.heart_rate != null ? `<div class="info-item"><span class="info-icon">❤️</span> ${a.heart_rate} bpm</div>` : ''}
              ${a.spo2 != null ? `<div class="info-item"><span class="info-icon">💧</span> ${a.spo2}% SpO₂</div>` : ''}
            </div>

            <div class="ai-plan-box" id="ai-plan-${a.id}"></div>

            <div class="card-actions">
              ${actionHtml}
            </div>
          </div>
        </div>
      `;
    }).join("");
  }

  async function resolve(id) {
    try {
      await fetch(`${API_URL}/resolve/${id}`, { method: "POST" });
      fetchAlerts();
    } catch (e) { console.error(e); }
  }

  async function getAiPlan(id, hr, spo2) {
    const box = document.getElementById(`ai-plan-${id}`);
    box.style.display = "block";
    box.innerHTML = "<em>Analyzing with Guardian AI...</em>";
    try {
      const r = await fetch(`${API_URL}/ai/analyze`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ heart_rate: hr, spo2: spo2, symptoms: "Emergency Alert Triggered" })
      });
      const data = await r.json();
      if(data.status === "success") {
        box.innerHTML = `<strong>AI Staff Action Plan:</strong><br/>${data.staff_action_plan.replace(/\n/g, '<br/>')}`;
      } else {
        box.innerHTML = `<span style="color:red">AI Error: ${data.message}</span>`;
      }
    } catch (e) {
      box.innerHTML = `<span style="color:red">Failed to connect to AI.</span>`;
    }
  }

  function formatTime(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", hour12: true });
    } catch { return iso; }
  }

  // Poll every 3s
  fetchAlerts();
  setInterval(fetchAlerts, 3000);
</script>
</body>
</html>

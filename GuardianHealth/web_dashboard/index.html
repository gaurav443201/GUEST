<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian Health Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; margin: 0; padding: 20px; color: #f8fafc; }
        .container { max-width: 1100px; margin: auto; }
        h1 { text-align: center; color: #f8fafc; margin-bottom: 30px; letter-spacing: 1px;}
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;}
        .live-badge { background: #ef4444; padding: 5px 10px; border-radius: 20px; font-weight: bold; font-size: 14px; animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        th, td { padding: 16px 20px; text-align: left; }
        th { background-color: #334155; color: #94a3b8; font-weight: 600; text-transform: uppercase; font-size: 13px; letter-spacing: 0.5px;}
        tr { border-bottom: 1px solid #334155; transition: all 0.2s ease;}
        tr:last-child { border-bottom: none; }
        tr:hover { background-color: #2dd4bf11; }
        .emergency { background-color: #7f1d1d88; border-left: 4px solid #ef4444; }
        .service { border-left: 4px solid #3b82f6; }
        .assistance { border-left: 4px solid #eab308; }
        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .emergency .status-badge { background: #ef4444; color: white; }
        .service .status-badge { background: #3b82f6; color: white; }
        .assistance .status-badge { background: #eab308; color: black; }
        .metric { font-weight: bold; font-size: 16px; }
        .metric.danger { color: #fca5a5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="dashboard-header">
            <h1>Guardian Health Live Monitors</h1>
            <div class="live-badge">● LIVE</div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Alert ID</th>
                    <th>Request Type</th>
                    <th>Location</th>
                    <th>Time</th>
                    <th>HR (BPM)</th>
                    <th>SpO2 (%)</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="alerts-body">
                <tr><td colspan="7" style="text-align: center; color: #94a3b8;">Waiting for live updates...</td></tr>
            </tbody>
        </table>
    </div>
    <script>
        const API_URL = "http://localhost:8000"; // Update when deployed

        async function fetchAlerts() {
            try {
                const response = await fetch(`${API_URL}/alerts`);
                if (!response.ok) throw new Error("Server disconnected");
                const alerts = await response.json();
                renderAlerts(alerts);
            } catch (error) {
                console.error("Error fetching alerts:", error);
            }
        }

        function renderAlerts(alerts) {
            const tbody = document.getElementById("alerts-body");
            if (alerts.length === 0) return;
            tbody.innerHTML = "";
            alerts.forEach(alert => {
                const tr = document.createElement("tr");
                let alertTypeFormatted = alert.type.replace('_', ' ').toUpperCase();
                
                if (alert.type === "emergency") tr.className = "emergency";
                else if (alert.type === "room_service") tr.className = "service";
                else if (alert.type === "assistance") tr.className = "assistance";

                const hrMetric = alert.heart_rate ? `<span class="metric ${alert.heart_rate > 150 ? 'danger' : ''}">${alert.heart_rate}</span>` : '-';
                const spoMetric = alert.spo2 ? `<span class="metric ${alert.spo2 < 85 ? 'danger' : ''}">${alert.spo2}%</span>` : '-';
                
                // Format relative time or standard time
                const timeStr = new Date(alert.timestamp).toLocaleTimeString();

                tr.innerHTML = `
                    <td>#${alert.id}</td>
                    <td><strong>${alertTypeFormatted}</strong></td>
                    <td>${alert.location}</td>
                    <td>${timeStr}</td>
                    <td>${hrMetric}</td>
                    <td>${spoMetric}</td>
                    <td><span class="status-badge">${alert.type === "emergency" ? "CRITICAL" : alert.status.toUpperCase()}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Poll every 1 second
        setInterval(fetchAlerts, 1000);
        fetchAlerts();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian Health Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; margin: 0; padding: 20px; color: #f8fafc; }
        .container { max-width: 1100px; margin: auto; }
        h1 { text-align: center; color: #f8fafc; margin-bottom: 30px; letter-spacing: 1px;}
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;}
        .live-badge { background: #ef4444; padding: 5px 10px; border-radius: 20px; font-weight: bold; font-size: 14px; animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        th, td { padding: 16px 20px; text-align: left; }
        th { background-color: #334155; color: #94a3b8; font-weight: 600; text-transform: uppercase; font-size: 13px; letter-spacing: 0.5px;}
        tr { border-bottom: 1px solid #334155; transition: all 0.2s ease;}
        tr:last-child { border-bottom: none; }
        tr:hover { background-color: #2dd4bf11; }
        .emergency { background-color: #7f1d1d88; border-left: 4px solid #ef4444; }
        .service { border-left: 4px solid #3b82f6; }
        .assistance { border-left: 4px solid #eab308; }
        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .emergency .status-badge { background: #ef4444; color: white; }
        .service .status-badge { background: #3b82f6; color: white; }
        .assistance .status-badge { background: #eab308; color: black; }
        .metric { font-weight: bold; font-size: 16px; }
        .metric.danger { color: #fca5a5; }
        
        /* New styling for resolved rows */
        tr.resolved { opacity: 0.6; filter: grayscale(100%); background-color: #1e293b !important; }
        tr.resolved .status-badge { background: #475569; color: #cbd5e1; }
        .resolve-btn {
            background-color: transparent;
            color: #94a3b8;
            border: 1px solid #475569;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .resolve-btn:hover { background-color: #10b981; color: white; border-color: #10b981; }

        
        @keyframes emergencyFlash {
            0% { box-shadow: inset 0 0 0 0 rgba(239,68,68, 0); }
            50% { box-shadow: inset 0 0 60px 20px rgba(239,68,68, 0.9); }
            100% { box-shadow: inset 0 0 0 0 rgba(239,68,68, 0); }
        }
        body.emergency-active {
            animation: emergencyFlash 1s infinite;
            background-color: #450a0a;
            transition: background-color 0.4s ease;
        }

        .clear-btn {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.4);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .clear-btn:hover {
            background-color: #059669;
            transform: translateY(-1px);
            box-shadow: 0 6px 8px -1px rgba(16, 185, 129, 0.4);
        }
        .clear-btn:active {
            transform: translateY(0);
        }
        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="dashboard-header">
            <h1>Guardian Health Live Monitors</h1>
            <div class="header-controls">
                <button class="clear-btn" onclick="clearAlerts()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 5H9l-7 7 7 7h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Z"></path><line x1="18" y1="9" x2="12" y2="15"></line><line x1="12" y1="9" x2="18" y2="15"></line></svg>
                    Resolve All
                </button>
                <div class="live-badge">● LIVE</div>
            </div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Alert ID</th>
                    <th>Request Type</th>
                    <th>Location</th>
                    <th>Time</th>
                    <th>HR (BPM)</th>
                    <th>SpO2 (%)</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="alerts-body">
                <tr><td colspan="7" style="text-align: center; color: #94a3b8;">Waiting for live updates...</td></tr>
            </tbody>
        </table>
    </div>
    <script>
        const API_URL = "https://guest-65oe.onrender.com"; // Update when deployed

        async function fetchAlerts() {
            try {
                const response = await fetch(`${API_URL}/alerts`);
                if (!response.ok) throw new Error("Server disconnected");
                const alerts = await response.json();
                renderAlerts(alerts);
            } catch (error) {
                console.error("Error fetching alerts:", error);
            }
        }

        function renderAlerts(alerts) {
            const tbody = document.getElementById("alerts-body");
            if (alerts.length === 0) return;
            
            let hasEmergency = false;
            tbody.innerHTML = "";
            
            alerts.forEach(alert => {
                const tr = document.createElement("tr");
                let alertTypeFormatted = alert.type.replace('_', ' ').toUpperCase();
                
                // Update row styling based on status
                if (alert.status === "resolved") {
                    tr.className = "resolved";
                    if (alert.type === "emergency") {
                        // Prevent emergency flashing if it was resolved
                        hasEmergency = false; 
                    }
                } else {
                    if (alert.type === "emergency") {
                        tr.className = "emergency";
                        hasEmergency = true;
                    }
                    else if (alert.type === "room_service") tr.className = "service";
                    else if (alert.type === "assistance") tr.className = "assistance";
                }

                const hrMetric = alert.heart_rate ? `<span class="metric ${alert.heart_rate > 150 ? 'danger' : ''}">${alert.heart_rate}</span>` : '-';
                const spoMetric = alert.spo2 ? `<span class="metric ${alert.spo2 < 85 ? 'danger' : ''}">${alert.spo2}%</span>` : '-';
                
                // Format relative time or standard time
                const timeStr = new Date(alert.timestamp).toLocaleTimeString();

                let badgeText = alert.status.toUpperCase();
                if (alert.type === "emergency" && alert.status !== "resolved") badgeText = "CRITICAL";

                tr.innerHTML = `
                    <td>#${alert.id}</td>
                    <td><strong>${alertTypeFormatted}</strong></td>
                    <td>${alert.location}</td>
                    <td>${timeStr}</td>
                    <td>${hrMetric}</td>
                    <td>${spoMetric}</td>
                    <td><span class="status-badge">${badgeText}</span></td>
                    <td>
                        ${alert.status !== 'resolved' ? `<button class="resolve-btn" onclick="resolveTask(${alert.id})">Mark Resolved</button>` : `<span style="font-size:12px; color:#475569;">✔ Done</span>`}
                    </td>
                `;
                tbody.appendChild(tr);
            });

            // Toggle red flashing animation
            if (hasEmergency) {
                document.body.classList.add("emergency-active");
            } else {
                document.body.classList.remove("emergency-active");
            }
        }

        // Poll every 1 second
        setInterval(fetchAlerts, 1000);
        fetchAlerts();

        async function clearAlerts() {
            try {
                const response = await fetch(`${API_URL}/clear`, { method: 'POST' });
                if (response.ok) {
                    fetchAlerts(); // Instantly refresh table
                    document.body.classList.remove("emergency-active"); // Instantly turn off flash
                } else {
                    alert("Failed to clear alerts.");
                }
            } catch (error) {
                console.error("Error clearing alerts:", error);
                alert("Error connecting to server.");
            }
        }

        async function resolveTask(alertId) {
            try {
                const response = await fetch(`${API_URL}/resolve/${alertId}`, { method: 'POST' });
                if (response.ok) {
                    fetchAlerts(); // Instantly refresh the table to show updated status
                } else {
                    alert("Failed to resolve task.");
                }
            } catch (error) {
                console.error("Error resolving task:", error);
                alert("Error connecting to server.");
            }
        }
    </script>
</body>
</html>
